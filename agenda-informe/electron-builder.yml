appId: com.agenda.informe
productName: Agenda Informe
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Agenda-Informe-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Agenda Informe
