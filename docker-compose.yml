# CentralMark — Docker Compose (producción VPS)
# Uso: docker compose up --build -d

name: centralmark

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: centralmark-web:latest
    container_name: centralmark-web
    restart: unless-stopped
    ports:
      # Expuesto en 80 para demo; delante se puede poner Caddy/Nginx después
      - "80:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # DB SQLite persistente en volumen
      DATABASE_URL: "file:/app/data/dev.db"
    volumes:
      - centralmark_data:/app/data
      - centralmark_uploads:/app/public/uploads
      - centralmark_generated:/app/public/generated
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/acceso').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 50s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  centralmark_data:
    name: centralmark_data
  centralmark_uploads:
    name: centralmark_uploads
  centralmark_generated:
    name: centralmark_generated
